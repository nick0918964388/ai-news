<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 日報 | 歷史存檔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            color: #1a1a1a;
        }
        
        .header {
            background: #fff;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3em;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
        }
        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: #f0f0f0;
        }
        .back-btn:hover {
            background: #e0e0e0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        
        .section-title {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 4px;
        }
        
        .archive-list {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .archive-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }
        .archive-item:last-child {
            border-bottom: none;
        }
        .archive-item:hover {
            background: #fafafa;
        }
        .archive-item.today {
            background: #f8f9fa;
        }
        
        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .item-date {
            font-size: 1.1em;
            font-weight: 600;
        }
        .item-weekday {
            font-size: 0.85em;
            color: #999;
        }
        .item-badge {
            background: #1a1a1a;
            color: #fff;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .item-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .item-count {
            font-size: 0.85em;
            color: #999;
        }
        .item-arrow {
            color: #ccc;
            font-size: 1.2em;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-icon {
            font-size: 3em;
            margin-bottom: 16px;
        }
        
        .footer {
            text-align: center;
            padding: 24px 16px 40px;
            color: #999;
            font-size: 0.8em;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <a href="index.html" class="logo">📰 AI 日報</a>
            <a href="index.html" class="back-btn">← 返回今日</a>
        </div>
    </header>

    <div class="container">
        <div class="section-title">2026 年 3 月</div>
        <div class="archive-list">
            <a href="daily/2026-03-13.html" class="archive-item today">
                <div class="item-left">
                    <span class="item-date">03/13</span>
                    <span class="item-weekday">週四</span>
                    <span class="item-badge">TODAY</span>
                </div>
                <div class="item-right">
                    <span class="item-count">10 則新聞</span>
                    <span class="item-arrow">›</span>
                </div>
            </a>
            <!-- 未來會自動加入更多日期 -->
        </div>
        
        <div style="margin-top: 32px;">
            <div class="section-title">說明</div>
            <div class="archive-list">
                <div style="padding: 20px; color: #666; font-size: 0.9em; line-height: 1.7;">
                    📅 每日自動更新最新 AI 新聞<br>
                    🔄 涵蓋 Claude、ChatGPT、Gemini 等<br>
                    📖 完整翻譯 + 洞見分析
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>由 <a href="https://github.com/clawdbot/clawdbot">Clawdbot</a> 自動整理</p>
    </footer>
</body>
</html>
